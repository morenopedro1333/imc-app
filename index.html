<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Track IMC</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
font-family: 'Quicksand', sans-serif;
margin:0;
background:#ffe4ec;
min-height:100vh;
display:flex;
justify-content:center;
}

/* FONDO */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('https://cdn-icons-png.flaticon.com/512/135/135620.png'),
           url('https://cdn-icons-png.flaticon.com/512/415/415733.png');
background-size:80px;
opacity:0.08;
z-index:-1;
}

/* CONTENEDOR */
.container{
max-width:420px;
margin:20px;
padding:20px;
background:white;
border-radius:25px;
box-shadow:0px 0px 25px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

.container:hover{
transform:scale(1.02);
}

/* BOTÓN CAMBIO */
.theme{
position:fixed;
top:10px;
right:10px;
background:#64b5f6;
color:white;
padding:10px;
border-radius:10px;
cursor:pointer;
}

/* INPUTS */
input{
width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

/* BOTÓN */
button{
width:90%;
padding:12px;
margin:10px;
background:#64b5f6;
color:white;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

/* RESULTADO */
#resultado{
margin-top:10px;
font-weight:bold;
font-size:18px;
animation: aparecer 0.6s;
}

/* ANIMACIÓN */
@keyframes aparecer{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

/* TARJETAS */
.card{
background:#f0f8ff;
padding:12px;
border-radius:15px;
margin-top:10px;
text-align:left;
}

/* BARRA */
.barra{
height:20px;
background:#ddd;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.progreso{
height:100%;
width:0%;
transition:1s;
}

/* TABLA */
.tabla{
margin-top:15px;
border-radius:15px;
overflow:hidden;
}

.fila{
display:flex;
justify-content:space-between;
padding:10px;
color:white;
}

.bajo{background:#64b5f6;}
.normal{background:#81c784;}
.sobre{background:#ffb74d;}
.obeso{background:#e57373;}

h2{
font-size:24px;
}
/* LISTAS BONITAS */
.card ul{
  padding-left:20px;
}

.card li{
  margin-bottom:6px;
}

/* EFECTO BOTÓN */
button:hover{
  transform:scale(1.05);
  background:#42a5f5;
}

/* ANIMACIÓN TARJETA */
.card{
  transition:0.3s;
}

.card:hover{
  transform:scale(1.02);
}

/* ANIMACIÓN SUAVE */
@keyframes aparecerSuave{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}           
</style>
</head>

<body>

<div class="theme" onclick="cambiarFondo()">🎨 Fondo</div>

<div class="container">

<h2>💙 Health Track IMC 💙</h2>

<input id="nombre" placeholder="Nombre">
<input id="peso" type="number" step="0.01" placeholder="Peso (kg)">
<input id="altura" type="number" step="0.01" placeholder="Altura (ej: 1.70)">

<button onclick="calcular()">Calcular IMC</button>

<div id="resultado"></div>

<!-- BARRA -->
<div class="barra">
<div id="barraIMC" class="progreso"></div>
</div>

<div id="recomendaciones" class="card"></div>

<!-- TABLA -->
<div class="tabla">
<div class="fila bajo"><span>< 18.5</span><span>Bajo peso</span></div>
<div class="fila normal"><span>18.5 - 24.9</span><span>Normal</span></div>
<div class="fila sobre"><span>25 - 29.9</span><span>Sobrepeso</span></div>
<div class="fila obeso"><span>> 30</span><span>Obesidad</span></div>
</div>

</div>

<audio id="sonido" preload="auto">
  <source src="https://www.soundjay.com/button/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>

function cambiarFondo(){
let colores = ["#ffe4ec","#e3f2fd","#e8f5e9","#fff3e0"];
document.body.style.background = colores[Math.floor(Math.random()*colores.length)];
}

function calcular(){

let sonido = document.getElementById("sonido");
sonido.currentTime = 0;
sonido.volume = 0.5;
sonido.play().catch(() => console.log("Audio bloqueado"));

let nombre = document.getElementById("nombre").value;
let peso = parseFloat(document.getElementById("peso").value);
let altura = parseFloat(document.getElementById("altura").value);

if(!nombre || isNaN(peso) || isNaN(altura)){
document.getElementById("resultado").innerHTML="⚠️ Completa bien los datos";
return;
}

if(peso <= 0 || altura <= 0){
document.getElementById("resultado").innerHTML="⚠️ Datos inválidos";
return;
}

let imc = (peso / (altura * altura)).toFixed(2);

let estado="";
let recomendaciones="";
let color="";
let ancho = Math.min(imc * 2, 100);

/* CONDICIONES */
if(imc < 18.5){
estado="Bajo peso";
color="#64b5f6";

recomendaciones=`
<h3>🍎 Hábitos recomendados</h3>
<ul>
<li>Consumir alimentos ricos en proteínas (pollo, huevo, pescado)</li>
<li>Aumentar la cantidad de comidas al día</li>
<li>Beber suficiente agua</li>
<li>Dormir al menos 8 horas</li>
<li>Realizar ejercicios de fuerza (pesas, flexiones)</li>
</ul>
`;
}

else if(imc < 25){
estado="Normal";
color="#81c784";

recomendaciones=`
<h3>🥗 Hábitos saludables</h3>
<ul>
<li>Mantener una alimentación equilibrada</li>
<li>Realizar actividad física al menos 30 minutos diarios</li>
<li>Evitar el consumo excesivo de azúcar</li>
<li>Beber suficiente agua diariamente</li>
<li>Dormir bien y reducir el estrés</li>
</ul>
`;
}

else if(imc < 30){
estado="Sobrepeso";
color="#ffb74d";

recomendaciones=`
<h3>⚠️ Hábitos recomendados</h3>
<ul>
<li>Reducir el consumo de comida chatarra</li>
<li>Incrementar el consumo de frutas y verduras</li>
<li>Realizar ejercicio cardiovascular (caminar, correr)</li>
<li>Evitar bebidas azucaradas</li>
<li>Controlar las porciones de comida</li>
</ul>
`;
}

else{
estado="Obesidad";
color="#e57373";

recomendaciones=`
<h3>🚨 Hábitos importantes</h3>
<ul>
<li>Seguir una dieta saludable supervisada</li>
<li>Realizar actividad física progresiva</li>
<li>Evitar alimentos ultraprocesados</li>
<li>Beber agua en lugar de gaseosas</li>
<li>Consultar con un profesional de salud</li>
</ul>
`;
}

document.getElementById("resultado").innerHTML=
let res = document.getElementById("resultado");
res.style.transform = "scale(1.1)";
setTimeout(() => {
  res.style.transform = "scale(1)";
}, 200);           
`${nombre}, tu IMC es ${imc} (${estado}). Sigue cuidando tu salud 💪`;

let rec = document.getElementById("recomendaciones");

rec.style.animation = "aparecerSuave 0.5s";

rec.innerHTML =
recomendaciones + `<p><b>🌟 Nunca es tarde para mejorar tu salud. ¡Tú puedes!</b></p>`;

/* BARRA */
document.getElementById("barraIMC").style.width = ancho + "%";
document.getElementById("barraIMC").style.background = color;
document.querySelector(".container").style.border = "3px solid " + color;
}

</script>

</body>
</html>
