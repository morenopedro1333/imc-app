<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Track IMC PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
font-family: 'Quicksand', sans-serif;
margin:0;
background:#ffe4ec;
display:flex;
justify-content:center;
}

.container{
max-width:420px;
margin:20px;
padding:20px;
background:white;
border-radius:25px;
box-shadow:0 0 25px rgba(0,0,0,0.2);
text-align:center;
}

/* LOGO */
.logo{
width:80px;
height:80px;
border-radius:50%;
margin:auto;
background:url("https://cdn-icons-png.flaticon.com/512/1046/1046784.png") center/cover;
}

/* INPUT */
input{
width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid #ccc;
}

/* BOTONES */
button{
width:90%;
padding:14px;
margin:10px;
background:#64b5f6;
color:white;
border:none;
border-radius:15px;
cursor:pointer;
}

/* TARJETAS */
.card{
background:#f0f8ff;
padding:12px;
border-radius:15px;
margin-top:10px;
text-align:left;
}

/* RESULTADO */
#resultado{
font-weight:bold;
margin-top:10px;
}

/* BARRA */
.barra{
height:20px;
background:#ddd;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}
.progreso{
height:100%;
width:0%;
}

/* BOTÓN CURIOSIDADES */
.curiosidadesBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ff9800;
padding:12px;
border-radius:50%;
cursor:pointer;
color:white;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo"></div>

<h2>💙 Health Track IMC 💙</h2>

<input id="nombre" placeholder="Nombre">
<input id="peso" type="number" placeholder="Peso (kg)">
<input id="altura" type="number" placeholder="Altura (ej: 1.70)">

<button onclick="calcular()">Calcular IMC</button>
<button onclick="verHistorial()">📊 Historial</button>
<button onclick="borrarHistorial()">🗑️ Borrar</button>

<div id="resultado"></div>

<div class="barra">
<div id="barraIMC" class="progreso"></div>
</div>

<div id="recomendaciones" class="card"></div>
<div id="historial" class="card"></div>

</div>

<div class="curiosidadesBtn" onclick="curiosidades()">💡</div>

<audio id="sonido"></audio>

<script>

function calcular(){

let sonido = document.getElementById("sonido");

let nombre = document.getElementById("nombre").value;
let peso = parseFloat(document.getElementById("peso").value);
let altura = parseFloat(document.getElementById("altura").value);

if(!nombre || isNaN(peso) || isNaN(altura)){
resultado.innerHTML="⚠️ Completa los datos";
return;
}

let imc = (peso/(altura*altura)).toFixed(2);

let estado="", color="", mensaje="", recomendaciones="";

/* ESTADOS */

if(imc < 18.5){
estado="Bajo peso";
color="#64b5f6";
mensaje="💙 Necesitas mejorar tu alimentación";

sonido.src="https://www.soundjay.com/button/sounds/button-09.mp3";

recomendaciones=`
🍗 Proteínas: pollo, huevo, avena<br>
🍽 Comer 4-5 veces al día<br>
💧 2L de agua diario<br>
💪 Ejercicios: pesas, sentadillas<br>
😴 Dormir 8 horas
`;

}

else if(imc < 25){
estado="Normal";
color="#4caf50";
mensaje="💚 Excelente, sigue así";

sonido.src="https://www.soundjay.com/button/sounds/button-4.mp3";

recomendaciones=`
🥗 Dieta balanceada<br>
🏃 Ejercicio diario<br>
🚫 Menos azúcar<br>
💧 Agua constante<br>
😴 Buen descanso
`;

}

else if(imc < 30){
estado="Sobrepeso";
color="#ff9800";
mensaje="⚠️ Puedes mejorar tu salud";

sonido.src="https://www.soundjay.com/button/sounds/button-10.mp3";

recomendaciones=`
🥦 Más frutas y verduras<br>
🚫 Evitar comida chatarra<br>
🏃 Cardio: correr, saltar<br>
🥤 No gaseosas<br>
🍽 Controlar porciones
`;

}

else{
estado="Obesidad";
color="#f44336";
mensaje="🚨 Atención, mejora urgente";

sonido.src="https://www.soundjay.com/button/sounds/button-3.mp3";

recomendaciones=`
🥗 Dieta estricta<br>
🏃 Ejercicio progresivo<br>
🚫 Ultraprocesados<br>
💧 Mucha agua<br>
👨‍⚕️ Consulta médica
`;
}

/* SONIDO */
sonido.currentTime=0;
sonido.load();
sonido.play();

/* RESULTADO */
resultado.innerHTML=
`Hola ${nombre} 👋<br>
Tu IMC es <b>${imc}</b><br>
Estado: <b>${estado}</b><br>
${mensaje}`;

/* COLOR */
document.body.style.background=color;

/* RECOMENDACIONES */
document.getElementById("recomendaciones").innerHTML=
"<h3>Recomendaciones</h3>"+recomendaciones;

/* BARRA */
document.getElementById("barraIMC").style.width=(imc*2)+"%";
document.getElementById("barraIMC").style.background=color;

/* HISTORIAL */
let historial = JSON.parse(localStorage.getItem("imcHistorial")) || [];

historial.push({nombre, imc, estado});
localStorage.setItem("imcHistorial", JSON.stringify(historial));

}

/* HISTORIAL */
function verHistorial(){
let datos = JSON.parse(localStorage.getItem("imcHistorial")) || [];
let cont = document.getElementById("historial");

cont.innerHTML="<h3>Historial</h3>";

datos.slice().reverse().forEach(d=>{
cont.innerHTML += `👤 ${d.nombre} - ${d.imc} (${d.estado})<br>`;
});
}

/* BORRAR */
function borrarHistorial(){
localStorage.removeItem("imcHistorial");
historial.innerHTML="Borrado";
}

/* CURIOSIDADES */
function curiosidades(){

let datos=[
"🍎 La manzana mejora la digestión",
"🥑 El aguacate tiene grasas buenas",
"💧 Beber agua mejora el cerebro",
"🏃 Caminar 30 min al día mejora la salud",
"🍌 El plátano da energía rápida"
];

alert(datos[Math.floor(Math.random()*datos.length)]);
}

</script>

</body>
</html>
